<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Battle City — Web Port</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: monospace;
      color: #888;
    }
    h1 {
      color: #f8e800;
      font-size: 14px;
      letter-spacing: 4px;
      margin-bottom: 8px;
    }
    #screen {
      overflow: hidden;
      line-height: 0;
      border: 2px solid #333;
    }
    canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      margin-top: -24px;  /* hide 8 NES px × SCALE=3 overscan top */
      margin-bottom: -24px; /* hide 8 NES px × SCALE=3 overscan bottom */
    }
    .about {
      margin-top: 14px;
      font-size: 11px;
      color: #555;
      text-align: center;
      line-height: 1.8;
      max-width: 520px;
    }
    .about a {
      color: #f8e800;
      text-decoration: none;
    }
    .about a:hover { text-decoration: underline; }
    #controls-hint {
      display: flex;
      gap: 12px;
      margin-top: 10px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
      min-height: 22px;
    }
    .hb { display: flex; align-items: center; gap: 5px; color: #666; font-size: 11px; }
    .hb kbd {
      display: inline-block;
      padding: 2px 7px;
      background: #1e1e1e;
      border: 1px solid #3a3a3a;
      border-bottom: 2px solid #2a2a2a;
      border-radius: 4px;
      font-family: monospace;
      font-size: 11px;
      color: #bbb;
      line-height: 1.5;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <h1>BATTLE CITY</h1>
  <div id="screen"><canvas id="game"></canvas></div>
  <div id="controls-hint"></div>
  <p class="about">
    Faithful web reimplementation of the 1985 Namco Famicom game,<br>
    built by reverse-engineering the original ROM — CHR tiles, palettes,<br>
    level maps, physics, and sound reconstructed from scratch.<br>
    <a href="reverse.html">ROM reverse engineering</a> &nbsp;·&nbsp;
    <a href="architecture.html">web port architecture</a> &nbsp;·&nbsp;
    <a href="catalog.html">asset catalog</a>
  </p>
  <script src="levels.js"></script>
  <script src="sound.js"></script>
  <script src="game.js"></script>
</body>
</html>
