<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Battle City — Web Port</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: monospace;
      color: #888;
    }
    h1 {
      color: #f8e800;
      font-size: 14px;
      letter-spacing: 4px;
      margin-bottom: 8px;
    }
    canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border: 2px solid #333;
    }
    p {
      margin-top: 8px;
      font-size: 11px;
      color: #555;
    }
    #controls-hint {
      display: flex;
      gap: 12px;
      margin-top: 10px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
      min-height: 22px;
    }
    .hb { display: flex; align-items: center; gap: 5px; color: #666; font-size: 11px; }
    .hb kbd {
      display: inline-block;
      padding: 2px 7px;
      background: #1e1e1e;
      border: 1px solid #3a3a3a;
      border-bottom: 2px solid #2a2a2a;
      border-radius: 4px;
      font-family: monospace;
      font-size: 11px;
      color: #bbb;
      line-height: 1.5;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <h1>BATTLE CITY</h1>
  <canvas id="game"></canvas>
  <div id="controls-hint"></div>
  <p>RE ref: commit 973e914 &nbsp;|&nbsp; VS. Battle City (1985) Namco</p>
  <script src="levels.js"></script>
  <script src="sound.js"></script>
  <script src="game.js"></script>
</body>
</html>
